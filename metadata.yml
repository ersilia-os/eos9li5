Status: In progress
Title: Biosynfoni natural product fingerprint
Description: BioSynFoni is a biosynthesis-informed count-based molecular 
  fingerprint designed for natural product research. It decomposes molecules 
  into 39 biosynthetic building block substructures derived from Dewicks 
  classification of natural product biosynthetic pathways. The fingerprint is 
  computed via SMARTS substructure matching using RDKit and returns an integer 
  count vector. It was shown to outperform MACCS, Morgan, and Daylight-like 
  fingerprints for biosynthetic distance estimation and performs comparably for 
  natural product classification while being more compact and interpretable.
